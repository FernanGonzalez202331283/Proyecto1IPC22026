<div class="background">

  <div class="container">
    <div class="content">

      <ng-container [ngSwitch]="accion">

        <!-- BOTÓN PRINCIPAL -->
        <div class="top-bar">
          <button class="btn-crear" (click)="irDestinos('crear')">
            + Crear Destino
          </button>
        </div>

        <!-- FORM DESTINO -->
        <div *ngSwitchCase="'crear'" class="form-container">

          <h2>Crear Destino</h2>

          <div class="input-group">
            <input type="text" placeholder="Nombre del destino" [(ngModel)]="nombre">
            <input type="text" placeholder="País" [(ngModel)]="pais">
            <input type="text" placeholder="Clima (Ej: Tropical)" [(ngModel)]="clima">
          </div>

          <textarea placeholder="Descripción del destino..." [(ngModel)]="descripcion"></textarea>

          <input type="text" placeholder="URL de la imagen" [(ngModel)]="imagen_url">

          <!-- PREVIEW -->
          <div class="preview-container" *ngIf="imagen_url">
            <img [src]="imagen_url" class="preview">
          </div>

          <button class="confirmar" (click)="guardarDestino()">
            Guardar Destino
          </button>

          <p class="mensaje" *ngIf="mensaje">{{ mensaje }}</p>

        </div>

      </ng-container>

    </div>

    <!-- BOTÓN GLOBAL -->
    <button class="btn-regresar" (click)="regresar()">
      Regresar
    </button>

  </div>

</div>
