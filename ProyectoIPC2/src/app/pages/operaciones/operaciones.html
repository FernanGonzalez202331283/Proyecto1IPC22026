<div class = "background">
    <div class = "container">
      <h1 class="title">Área De Operadores</h1>
        <div class="cards"></div>
            <!-- destino -->     
            <div class="card"> 
                <h3>Gestion de Destinos</h3>
                <div class="buttons">
                    <button (click)="irDestinos('crear')">Crear Destino</button>
                    <button (click)="irDestinos('editar')">Editar Destino</button>
                    <button (click)="irDestinos('eliminar')">Eliminar Destino</button>
                </div>
            </div>

            <!-- paquetes -->
            <div class="card"> 
                <h3>Gestion de Paquetes</h3>
                <div class="buttons">
                    <button (click)="irPaquetes('crear')">Crear Paquete</button>
                    <button (click)="irPaquetes('editar')">Editar Paquete</button>
                    <button (click)="irPaquetes('desactivar')">Desactivar</button>
                    <button (click)="irPaquetes('activar')">Activar</button>
                </div>
            </div>

            <!-- servicio-->
            <div class="card"> 
                <h3>Gestion de Servicios</h3>
                <div class="buttons">
                    <button (click)="irServicio('crear')">Crear Servicio</button>
                    <button (click)="irServicio('consultar')">Consultar Servicio</button>
                </div>
            </div>

            <!-- proveedores -->
            <div class="card"> 
                <h3>Gestion de Proveedores</h3>
                <div class="buttons">
                    <button (click)="irProveedores('crear')">Crear Proveedor</button>
                    <button (click)="irProveedores('editar')">Editar Proveedor</button>
                    <button (click)="irProveedores('eliminar')">Eliminar Proveedor</button>
                </div>
            </div>
         <!-- BOTÓN REGRESAR -->
    <button class="btn-back" (click)="regresar()">Regresar</button>

    </div>
</div>
